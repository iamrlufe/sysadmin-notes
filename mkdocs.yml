site_name: RLUFE.KZ
site_description: "Практическая база знаний системного администратора: Windows Server, Linux, сети, мониторинг и инфраструктура"
site_url: https://rlufe.kz

# Битые ссылки и другие предупреждения роняют сборку, а не молча уходят в прод
strict: true

theme:
  name: material
  language: ru
  font:
    text: Roboto
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.indexes
    - header.autohide
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/iamrlufe/sysadmin-notes
repo_name: iamrlufe/sysadmin-notes
edit_uri: edit/main/docs/

hooks:
  - hooks/homepage_data.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/terminal.js
  - javascripts/snake.js

nav:
  - Главная: index.md
  - Linux:
      - notes/linux/index.md
      - notes/linux/example-note.md
      - notes/linux/atUtility.md
      - notes/linux/queueAsterisk.md
      - notes/linux/zimbraAdmin.md
  - Windows и ПО:
      - notes/windows/index.md
      - notes/windows/MicrosoftExcel-1C.md
      - notes/windows/lanPublic.md
      - notes/windows/srvinfoDebug1C.md
      - notes/windows/shrinkTempdb.md
      - notes/windows/autostartWindowsServer.md
  - Сети:
      - notes/network/index.md
      - notes/network/dh.md
      - notes/network/debugIpsec.md
      - notes/network/mikrotikOpenDnsResolver.md
  - Мониторинг:
      - notes/monitoring/index.md
  - Файлы и утилиты:
      - notes/files/index.md
      - notes/files/restoreDbFromBak.md
      - notes/files/restoreDbOverwriteFromBak.md
      - notes/files/uploadBackupsToFtp.md
      - notes/files/sqlReindexStats.md
  - Теги: tags.md

plugins:
  - search:
      lang: ru
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iamrlufe
