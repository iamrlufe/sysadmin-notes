site_name: Заметки сисадмина
site_description: Проблемы и решения из повседневной работы системного администратора
site_url: https://sysadmin-notes.pages.dev

theme:
  name: material
  language: ru
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Тёмная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Светлая тема
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.sections
    - navigation.indexes
    - header.autohide
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

repo_url: https://github.com/iamrlufe/sysadmin-notes
repo_name: iamrlufe/sysadmin-notes
edit_uri: edit/main/docs/

extra_css:
  - stylesheets/extra.css

nav:
  - Главная: index.md
  - Linux:
      - notes/linux/example-note.md
  - Windows и ПО:
      - notes/windows/MicrosoftExcel-1C.md
  - Сети:
      - notes/network/index.md
  - Мониторинг:
      - notes/monitoring/index.md
  - Файлы и утилиты:
      - notes/files/index.md

plugins:
  - search:
      lang: ru
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iamrlufe
